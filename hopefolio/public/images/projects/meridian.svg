<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#F5D78E"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(212,168,67,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Candlestick chart pattern -->
  <g transform="translate(180, 180)" opacity="0.15">
    <!-- Candlesticks -->
    <line x1="20" y1="20" x2="20" y2="120" stroke="#D4A843" stroke-width="1"/>
    <rect x="14" y="40" width="12" height="40" fill="#D4A843" opacity="0.6"/>
    <line x1="50" y1="30" x2="50" y2="100" stroke="#D4A843" stroke-width="1"/>
    <rect x="44" y="50" width="12" height="30" fill="none" stroke="#D4A843" stroke-width="1"/>
    <line x1="80" y1="10" x2="80" y2="110" stroke="#D4A843" stroke-width="1"/>
    <rect x="74" y="30" width="12" height="50" fill="#D4A843" opacity="0.6"/>
    <line x1="110" y1="40" x2="110" y2="130" stroke="#D4A843" stroke-width="1"/>
    <rect x="104" y="60" width="12" height="40" fill="none" stroke="#D4A843" stroke-width="1"/>
    <line x1="140" y1="5" x2="140" y2="90" stroke="#D4A843" stroke-width="1"/>
    <rect x="134" y="20" width="12" height="45" fill="#D4A843" opacity="0.6"/>
    <line x1="170" y1="25" x2="170" y2="105" stroke="#D4A843" stroke-width="1"/>
    <rect x="164" y="40" width="12" height="35" fill="#D4A843" opacity="0.6"/>
  </g>
  <!-- Signal arrow pattern -->
  <g transform="translate(880, 200)" opacity="0.12">
    <path d="M0,80 L40,60 L80,70 L120,30 L160,40" fill="none" stroke="#F5D78E" stroke-width="2"/>
    <polygon points="160,34 150,30 152,42" fill="#F5D78E"/>
    <circle cx="0" cy="80" r="4" fill="#F5D78E"/>
    <circle cx="40" cy="60" r="4" fill="#F5D78E"/>
    <circle cx="80" cy="70" r="4" fill="#F5D78E"/>
    <circle cx="120" cy="30" r="4" fill="#F5D78E"/>
  </g>
  <!-- Project name -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Meridian</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="url(#gold)" text-anchor="middle">Premium Trading Signal Platform</text>
  <!-- Gold accent line -->
  <rect x="470" y="380" width="260" height="3" rx="1.5" fill="url(#gold)" opacity="0.4"/>
</svg>