<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BE185D"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <pattern id="tri" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,0 60,52 0,52" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#tri)"/>
  <!-- Film strip / frames -->
  <g transform="translate(160, 190)" opacity="0.12">
    <rect x="0" y="0" width="80" height="60" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <rect x="90" y="0" width="80" height="60" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <rect x="180" y="0" width="80" height="60" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <!-- Sprocket holes -->
    <circle cx="10" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="40" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="70" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="100" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="130" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="160" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="190" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="220" cy="-10" r="4" fill="white" opacity="0.4"/>
    <circle cx="250" cy="-10" r="4" fill="white" opacity="0.4"/>
  </g>
  <!-- Motion curves -->
  <g transform="translate(850, 180)" opacity="0.12">
    <path d="M0,80 C30,80 30,0 60,0 C90,0 90,80 120,80 C150,80 150,0 180,0" fill="none" stroke="white" stroke-width="2"/>
    <path d="M0,100 C40,100 40,20 80,20 C120,20 120,100 160,100" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- Project name -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">FrameFX</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">Token-Driven Motion Design Framework</text>
  <!-- Accent line -->
  <rect x="460" y="380" width="280" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Package count -->
  <text x="600" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">8-Package Remotion Monorepo</text>
</svg>