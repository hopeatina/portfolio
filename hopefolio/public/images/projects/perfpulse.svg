<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B91C1C"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <pattern id="circuit" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 30 20 M 0 30 L 20 30 M 30 40 L 30 60 M 40 30 L 60 30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <circle cx="30" cy="30" r="3" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#circuit)"/>
  <!-- Performance graph -->
  <g transform="translate(180, 180)" opacity="0.15">
    <line x1="0" y1="150" x2="250" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="white" stroke-width="1"/>
    <polyline points="0,120 30,100 60,110 90,60 120,80 150,40 180,50 210,20 240,30" fill="none" stroke="white" stroke-width="2"/>
    <polyline points="0,130 30,125 60,120 90,100 120,105 150,90 180,85 210,70 240,75" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- Rust gear icon -->
  <g transform="translate(900, 200)" opacity="0.1">
    <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="50" cy="50" r="25" fill="none" stroke="white" stroke-width="2"/>
    <rect x="45" y="0" width="10" height="20" rx="2" fill="white"/>
    <rect x="45" y="80" width="10" height="20" rx="2" fill="white"/>
    <rect x="0" y="45" width="20" height="10" rx="2" fill="white"/>
    <rect x="80" y="45" width="20" height="10" rx="2" fill="white"/>
    <rect x="12" y="12" width="10" height="20" rx="2" fill="white" transform="rotate(45, 17, 22)"/>
    <rect x="78" y="12" width="10" height="20" rx="2" fill="white" transform="rotate(-45, 83, 22)"/>
    <rect x="12" y="68" width="10" height="20" rx="2" fill="white" transform="rotate(-45, 17, 78)"/>
    <rect x="78" y="68" width="10" height="20" rx="2" fill="white" transform="rotate(45, 83, 78)"/>
  </g>
  <!-- Project name -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">PerfPulse</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">AI-Powered System Monitor in Rust</text>
  <!-- Accent line -->
  <rect x="470" y="380" width="260" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>