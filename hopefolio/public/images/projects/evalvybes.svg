<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Decorative circles representing model comparison -->
  <circle cx="300" cy="315" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="420" cy="315" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="360" cy="240" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Waveform pattern for voice -->
  <g transform="translate(750, 280)" opacity="0.15">
    <rect x="0" y="20" width="8" height="30" rx="4" fill="white"/>
    <rect x="16" y="10" width="8" height="50" rx="4" fill="white"/>
    <rect x="32" y="0" width="8" height="70" rx="4" fill="white"/>
    <rect x="48" y="15" width="8" height="40" rx="4" fill="white"/>
    <rect x="64" y="5" width="8" height="60" rx="4" fill="white"/>
    <rect x="80" y="20" width="8" height="30" rx="4" fill="white"/>
    <rect x="96" y="10" width="8" height="50" rx="4" fill="white"/>
    <rect x="112" y="25" width="8" height="20" rx="4" fill="white"/>
    <rect x="128" y="5" width="8" height="60" rx="4" fill="white"/>
    <rect x="144" y="15" width="8" height="40" rx="4" fill="white"/>
  </g>
  <!-- Project name -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">EvalVybes</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">Voice-Powered AI Model Comparison</text>
  <!-- Accent line -->
  <rect x="500" y="380" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>