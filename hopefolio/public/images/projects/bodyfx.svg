<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#scanlines)"/>
  <!-- Segmentation silhouette outline -->
  <g transform="translate(200, 120)" opacity="0.12">
    <path d="M80 0 C90 0 100 10 100 30 L100 80 L130 80 L130 200 L120 200 L120 350 L100 350 L100 380 L60 380 L60 350 L40 350 L40 200 L30 200 L30 80 L60 80 L60 30 C60 10 70 0 80 0Z" fill="none" stroke="white" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="80" cy="20" r="25" fill="none" stroke="white" stroke-width="2" stroke-dasharray="8,4"/>
  </g>
  <!-- Video frames representation -->
  <g transform="translate(850, 180)" opacity="0.15">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <rect x="20" y="15" width="120" height="80" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <rect x="40" y="30" width="120" height="80" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <polygon points="85,55 85,85 110,70" fill="white" opacity="0.5"/>
  </g>
  <!-- Project name -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">BodyFX</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">AI Video Segmentation &amp; Visual Effects</text>
  <!-- Accent line -->
  <rect x="480" y="380" width="240" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>