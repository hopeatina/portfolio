<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <pattern id="cross" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 15 L 20 25 M 15 20 L 25 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#cross)"/>
  <!-- Heartbeat/pulse line -->
  <g transform="translate(150, 260)" opacity="0.15">
    <polyline points="0,50 80,50 100,50 120,10 140,90 160,30 180,70 200,50 280,50 300,50 320,10 340,90 360,30 380,70 400,50 500,50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Shield/compliance icon -->
  <g transform="translate(880, 170)" opacity="0.1">
    <path d="M60 0 L120 30 L120 80 C120 120 90 150 60 160 C30 150 0 120 0 80 L0 30 Z" fill="none" stroke="white" stroke-width="3"/>
    <polyline points="35,80 55,100 90,60" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Project name -->
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Alma</text>
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">HIPAA-compliant backend · Django · Celery · Postgres</text>
  <!-- Accent line -->
  <rect x="460" y="370" width="280" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Metric callout -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">999 commits · 2.7 years · 7 feature areas shipped</text>
</svg>