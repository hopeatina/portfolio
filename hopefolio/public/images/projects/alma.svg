<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d10"/>
      <stop offset="50%" style="stop-color:#101614"/>
      <stop offset="100%" style="stop-color:#0a0f0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="25%" r="60%">
      <stop offset="0%" style="stop-color:rgba(0,229,160,0.14)"/>
      <stop offset="100%" style="stop-color:rgba(0,229,160,0)"/>
    </radialGradient>
    <pattern id="cross" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 22 16 L 22 28 M 16 22 L 28 22" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#cross)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Heartbeat/pulse line -->
  <g transform="translate(130, 280)" opacity="0.18">
    <polyline points="0,50 80,50 100,50 120,10 140,90 160,30 180,70 200,50 280,50 300,50 320,10 340,90 360,30 380,70 400,50 500,50" fill="none" stroke="rgba(0,229,160,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Shield/compliance icon -->
  <g transform="translate(930, 150)" opacity="0.14">
    <path d="M60 0 L120 30 L120 80 C120 120 90 150 60 160 C30 150 0 120 0 80 L0 30 Z" fill="none" stroke="rgba(0,229,160,0.95)" stroke-width="3"/>
    <polyline points="35,80 55,100 90,60" fill="none" stroke="rgba(0,229,160,0.95)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Accent top-left dot -->
  <circle cx="62" cy="62" r="6" fill="rgba(0,229,160,0.9)"/>
  <text x="88" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="rgba(255,255,255,0.65)" letter-spacing="2">HIPAA — PRODUCTION</text>

  <!-- Project name -->
  <text x="600" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">Alma</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.72)" text-anchor="middle" letter-spacing="0.4">HIPAA-compliant backend · Django · Celery · Postgres</text>

  <!-- Accent line -->
  <rect x="500" y="388" width="200" height="2" rx="1" fill="rgba(0,229,160,0.55)"/>

  <!-- Metric callout -->
  <text x="600" y="432" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">999 COMMITS · 2.7 YEARS · 7 FEATURE AREAS SHIPPED</text>
</svg>
